name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 4.7.4)'
        required: true
        default: '0.0.0-dev'

jobs:
  test:
    runs-on: ubuntu-latest

    # GitHub Actions is deprecating Node.js 20 for JavaScript-based actions.
    # Force Node.js 24 now to avoid warnings and future breakage.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v6
      - name: Initialize submodules
        run: git submodule update --init --recursive
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install dependencies
        run: |
          uv sync --all-extras
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          pip install testcontainers ruamel.yaml
      - name: Run tests
        run: pytest tests/ -v --tb=short