blueprint:
  name: E2E Test Blueprint
  description: Minimal automation blueprint used by ha-mcp E2E tests. Safe to delete.
  domain: automation
  input:
    target_entity:
      name: Target Entity
      description: The entity to control
      selector:
        entity: {}

trigger:
  - platform: time
    at: "00:00:00"

action:
  - service: homeassistant.turn_on
    target:
      entity_id: !input target_entity
