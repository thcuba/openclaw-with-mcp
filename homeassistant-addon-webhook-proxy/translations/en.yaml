---
configuration:
  remote_url:
    name: External URL (optional)
    description: |
      Public base URL for remote access (e.g. https://example.duckdns.org).
      Leave blank to auto-detect Nabu Casa.
  mcp_server_url:
    name: MCP server URL (optional)
    description: |
      Full URL of the MCP server to proxy to (e.g. http://192.168.1.100:9583/private_abc123).
      Leave blank to auto-discover from a running HA MCP addon.
  mcp_port:
    name: MCP server port (optional)
    description: |
      Port the MCP addon listens on. Only used during auto-discovery.
      Default: 9583.
